[theme]
primaryColor = "#006D66"
backgroundColor = "#F7FBFF"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"

[server]
maxUploadSize = 10
enableXsrfProtection = false
enableCORS = false
headless = true

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = true
toolbarMode = "minimal"
